name: StableOfWar daily raffle

on:
  schedule:
    - cron: "3 19 9-15 6 *"
  workflow_dispatch:
    inputs:
      draw_date:
        description: "Draw date as YYYY-MM-DD"
        required: false
        type: string
      not_before_now:
        description: "Use a NIST pulse no earlier than the current UTC minute"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve draw date
        id: date
        shell: bash
        run: |
          if [ -n "${{ inputs.draw_date }}" ]; then
            echo "draw_date=${{ inputs.draw_date }}" >> "$GITHUB_OUTPUT"
            echo "has_draw=true" >> "$GITHUB_OUTPUT"
          else
            draw_date="$(python scripts/resolve_draw_date.py)"
            if [ -n "$draw_date" ]; then
              echo "draw_date=$draw_date" >> "$GITHUB_OUTPUT"
              echo "has_draw=true" >> "$GITHUB_OUTPUT"
            else
              echo "No missing draw date is due yet."
              echo "has_draw=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run draw
        id: draw
        if: steps.date.outputs.has_draw == 'true'
        shell: bash
        run: |
          args=(--date "${{ steps.date.outputs.draw_date }}")
          if [ "${{ inputs.not_before_now }}" = "true" ]; then
            args+=(--not-before-now)
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            args+=(--skip-if-nist-unavailable)
          fi
          python scripts/draw.py "${args[@]}"
          if [ -f "results/${{ steps.date.outputs.draw_date }}.json" ]; then
            echo "created=true" >> "$GITHUB_OUTPUT"
          else
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify draw
        if: steps.draw.outputs.created == 'true'
        run: python scripts/verify.py --date "${{ steps.date.outputs.draw_date }}"

      - name: Commit draw artifacts
        if: steps.draw.outputs.created == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results announcements images
          if git diff --cached --quiet; then
            echo "No draw artifacts changed."
          else
            git commit -m "chore: add StableOfWar draw ${{ steps.date.outputs.draw_date }}"
            git push
          fi
